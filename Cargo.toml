[package]
name = "dia"
version = "0.1.0"
edition = "2024"
rust-version = "1.95"
# `dia` source is MIT OR Apache-2.0 (caller's choice).
# `models/plda/*.bin` are embedded into the compiled artifact via
# `include_bytes!` (see `src/plda/loader.rs`); those weights are
# CC-BY-4.0 with attribution required (see `NOTICE` and
# `models/plda/SOURCE.md`). Downstream redistributors of any binary
# linking `dia` MUST reproduce the CC-BY-4.0 attribution.
license = "(MIT OR Apache-2.0) AND CC-BY-4.0"
repository = "https://github.com/al8n/dia"
homepage = "https://github.com/al8n/dia"
documentation = "https://docs.rs/dia"
description = "Sans-I/O speaker diarization for streaming audio (segmentation; embedding to follow)."
readme = "README.md"

[features]
default = ["ort"]
ort = ["dep:ort"]
# An earlier revision exposed `dia::plda::RawEmbedding::from_raw_array`
# and `dia::plda::PostXvecEmbedding::from_pyannote_capture` behind a
# public `plda-fixtures` feature, intending it to act as the gate that
# kept distribution-invariant constructors out of production code.
# Cargo features are unified across the dep graph though, so any crate
# in the build (including parity tooling and offline scripts) enabling
# `plda-fixtures` would have re-exposed those constructors for the
# entire compile, collapsing the type-level guard. Codex review
# MEDIUM. The constructors are now `#[cfg(test)] pub(crate)` and the
# parity test lives inside the crate as a `#[cfg(test)]` module so it
# can still construct via the internal API. Production integration
# (Phase 5+) will own a single typed entry from `EmbedModel`.
# `std` is now unconditional. The crate uses std/alloc throughout
# (`Vec`, `HashMap`, `kaldi-native-fbank` C bindings, `nalgebra`'s
# default `std` feature, etc.); the previous `#![no_std]` toggle was
# advertised but never actually compiled. Codex review HIGH —
# `cargo check --no-default-features` failed with 47 errors before.
# If a future Sans-I/O / `alloc`-only mode is wanted, it will need a
# real audit of the dependency set, not just a feature flag.

[dependencies]
mediatime = "0.1"
thiserror = "2"
ort = { version = "2.0.0-rc.12", optional = true }

# New in v0.1.0 phase 2 (spec §7).
kaldi-native-fbank = "0.1"
nalgebra = "0.34"
rand = { version = "0.10", default-features = false }
rand_chacha = { version = "0.10", default-features = false }


[dev-dependencies]
anyhow = "1"
criterion = "0.8"
hound = "3"
tempfile = "3"
# `dia::plda` parity tests load Phase-0 captured `.npz` artifacts.
# Production code embeds the PLDA weights via `include_bytes!` and
# does not depend on npyz.
npyz = { version = "0.9", features = ["npz"] }

[[bench]]
path = "benches/segment.rs"
name = "segment"
harness = false

[profile.bench]
opt-level = 3
debug = false
codegen-units = 1
lto = "thin"
incremental = false
debug-assertions = false
overflow-checks = false
rpath = false

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints.rust]
rust_2018_idioms = "warn"
single_use_lifetimes = "warn"
unexpected_cfgs = { level = "warn", check-cfg = [
  'cfg(all_tests)',
  'cfg(tarpaulin)',
] }
