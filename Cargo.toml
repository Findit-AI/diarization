[package]
name = "dia"
version = "0.1.0"
edition = "2024"
rust-version = "1.95"
# `dia` source is MIT OR Apache-2.0 (caller's choice).
# `models/plda/*.bin` are embedded into the compiled artifact via
# `include_bytes!` (see `src/plda/loader.rs`); those weights are
# CC-BY-4.0 with attribution required (see `NOTICE` and
# `models/plda/SOURCE.md`). Downstream redistributors of any binary
# linking `dia` MUST reproduce the CC-BY-4.0 attribution.
license = "(MIT OR Apache-2.0) AND CC-BY-4.0"
repository = "https://github.com/al8n/dia"
homepage = "https://github.com/al8n/dia"
documentation = "https://docs.rs/dia"
description = "Sans-I/O speaker diarization for streaming audio (segmentation; embedding to follow)."
readme = "README.md"

[features]
default = ["ort"]
ort = ["dep:ort"]
# `plda-fixtures` exposes the public constructors of
# `dia::plda::RawEmbedding` and `dia::plda::PostXvecEmbedding`
# (`from_raw_array`, `from_pyannote_capture`). Off by default â€”
# enabling this feature is the explicit signal that the caller is
# parity-test code or offline tooling, NOT production. Production
# integration (Phase 5+) will route raw embeddings through
# `EmbedModel`'s typed raw-output path instead. Codex review HIGH:
# distribution-invariant constructors must not be reachable from
# production code, since both `RawEmbedding::from_raw_array(any_arr)`
# and `PostXvecEmbedding::from_pyannote_capture(any_norm_sqrt_128)`
# admit wrong-distribution inputs that would silently corrupt VBx.
plda-fixtures = []
# `std` is now unconditional. The crate uses std/alloc throughout
# (`Vec`, `HashMap`, `kaldi-native-fbank` C bindings, `nalgebra`'s
# default `std` feature, etc.); the previous `#![no_std]` toggle was
# advertised but never actually compiled. Codex review HIGH â€”
# `cargo check --no-default-features` failed with 47 errors before.
# If a future Sans-I/O / `alloc`-only mode is wanted, it will need a
# real audit of the dependency set, not just a feature flag.

[dependencies]
mediatime = "0.1"
thiserror = "2"
ort = { version = "2.0.0-rc.12", optional = true }

# New in v0.1.0 phase 2 (spec Â§7).
kaldi-native-fbank = "0.1"
nalgebra = "0.34"
rand = { version = "0.10", default-features = false }
rand_chacha = { version = "0.10", default-features = false }


[dev-dependencies]
anyhow = "1"
criterion = "0.8"
hound = "3"
tempfile = "3"
# `dia::plda` parity tests load Phase-0 captured `.npz` artifacts.
# Production code embeds the PLDA weights via `include_bytes!` and
# does not depend on npyz.
npyz = { version = "0.9", features = ["npz"] }

[[bench]]
path = "benches/segment.rs"
name = "segment"
harness = false

# Parity tests for `dia::plda` need to construct `RawEmbedding` and
# `PostXvecEmbedding` from `.npz` fixtures. Those constructors are
# gated behind `plda-fixtures`; this declaration makes
# `cargo test --features plda-fixtures` (or the equivalent) the only
# build that compiles + runs the parity test, and `cargo test`
# without the feature simply skips it.
[[test]]
name = "parity_plda"
required-features = ["plda-fixtures"]

[profile.bench]
opt-level = 3
debug = false
codegen-units = 1
lto = "thin"
incremental = false
debug-assertions = false
overflow-checks = false
rpath = false

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints.rust]
rust_2018_idioms = "warn"
single_use_lifetimes = "warn"
unexpected_cfgs = { level = "warn", check-cfg = [
  'cfg(all_tests)',
  'cfg(tarpaulin)',
] }
